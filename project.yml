name: SightWords
options:
  bundleIdPrefix: com.levelup
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"          # universal: iPhone (portrait) + iPad (landscape)
    DEVELOPMENT_TEAM: "6A4J2GTB6F"     # Justin Nikolaus (paid team — signing lasts a year)
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: "YES"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UIRequiresFullScreen: "YES"
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"   # offline app, no custom crypto — skips TestFlight compliance prompt
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "Sight Words listens so it can tell if a word was read correctly. Audio never leaves this iPad."
    INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Used to check spoken words on this iPad only."

targets:
  SightWords:
    type: application
    platform: iOS
    sources:
      - path: Sources/Engine
      - path: Sources/App
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levelup.sightwords
        INFOPLIST_KEY_CFBundleDisplayName: "Sight Words"
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: "NO"
